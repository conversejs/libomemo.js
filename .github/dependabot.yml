# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Security updates are enabled automatically for every ecosystem listed here;
# the schedule below additionally keeps dependencies current proactively.

version: 2
updates:
  # Runtime + dev dependencies (package.json / package-lock.json).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch routine dev-tooling bumps into a single PR to cut review noise.
      # The runtime dependency (protobufjs) and any security fix still get
      # their own dedicated PRs.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pinned in the CI and CodeQL workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
